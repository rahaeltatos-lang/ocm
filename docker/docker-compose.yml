version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ocm-postgres
    environment:
      POSTGRES_DB: openclawmatrix
      POSTGRES_USER: openclawmatrix
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openclawmatrix"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Server
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: api
    container_name: ocm-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://openclawmatrix:password@postgres:5432/openclawmatrix
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: openclawmatrix
      DB_USER: openclawmatrix
      DB_PASSWORD: password
      API_PORT: 4001
      NODE_ENV: development
      FRONTEND_URL: http://localhost:3001
      JWT_SECRET: dev-jwt-secret-change-in-production
    ports:
      - "4001:4001"
    volumes:
      - ../api/src:/app/src
    command: npm run dev

  # Web Frontend
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: web
    container_name: ocm-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4001
      NEXT_PUBLIC_APP_NAME: OpenClawMatrix Agent Teams
    ports:
      - "3001:3001"
    volumes:
      - ../web:/app
    depends_on:
      - api

volumes:
  postgres_data:

networks:
  default:
    name: ocm-network
